<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sketch Colorizer</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #1a1a2e;
    color: #e0e0e0;
    font-family: 'Segoe UI', system-ui, sans-serif;
    font-size: 12px;
    display: flex;
    height: 100vh;
    overflow: hidden;
  }

  /* ================================================================
     PANEL IZQUIERDO — compacto, sin scroll
  ================================================================ */
  #panel-izq {
    width: 172px;
    min-width: 172px;
    background: #16213e;
    border-right: 1px solid #0f3460;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .sec {
    padding: 6px 8px;
    border-bottom: 1px solid #0f3460;
  }

  .sec-title {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: .8px;
    color: #506070;
    margin-bottom: 5px;
  }

  /* ---- Carga ---- */
  #drop-zone {
    border: 1px dashed #0f3460;
    border-radius: 5px;
    padding: 7px 4px;
    text-align: center;
    cursor: pointer;
    color: #506070;
    font-size: 10px;
    transition: border-color .2s, background .2s;
    line-height: 1.4;
  }
  #drop-zone:hover, #drop-zone.drag-over {
    border-color: #e94560;
    background: rgba(233,69,96,.06);
    color: #e0e0e0;
  }
  #input-archivo { display: none; }

  /* ---- Grid de herramientas 4 columnas ---- */
  .tools-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 3px;
    margin-bottom: 5px;
  }
  .tool-btn {
    padding: 4px 2px 3px;
    border-radius: 4px;
    border: 1px solid #1a3050;
    background: #1a2a4a;
    color: #a0b0c0;
    cursor: pointer;
    font-size: 9px;
    text-align: center;
    transition: background .12s, border-color .12s, color .12s;
    user-select: none;
  }
  .tool-btn:hover { background: #1f3460; color: #e0e0e0; }
  .tool-btn.activo { background: #e94560; border-color: #e94560; color: #fff; }
  .tool-btn .ico { font-size: 13px; display: block; line-height: 1.2; }

  /* ---- Sliders compactos ---- */
  .sl-row {
    display: flex;
    align-items: center;
    gap: 4px;
    margin-top: 4px;
  }
  .sl-label { color: #506070; white-space: nowrap; font-size: 9px; flex-shrink: 0; }
  .sl-row input[type=range] {
    flex: 1;
    height: 3px;
    accent-color: #e94560;
    cursor: pointer;
  }
  .sl-val { color: #e94560; font-size: 9px; width: 20px; text-align: right; flex-shrink: 0; }

  /* ---- Paleta ---- */
  #paleta-colores {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 3px;
    margin-bottom: 4px;
  }
  .color-chip {
    width: 100%;
    aspect-ratio: 1;
    border-radius: 3px;
    border: 1.5px solid transparent;
    cursor: pointer;
    transition: transform .1s, border-color .1s;
  }
  .color-chip:hover { transform: scale(1.2); }
  .color-chip.sel { border-color: #fff; transform: scale(1.2); }

  #color-custom {
    width: 100%;
    height: 22px;
    border-radius: 4px;
    border: 1px solid #0f3460;
    background: #1a2a4a;
    cursor: pointer;
    padding: 1px;
  }

  /* ---- Color activo preview ---- */
  #color-preview {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    border: 2px solid #0f3460;
    flex-shrink: 0;
    margin-bottom: 4px;
  }

  /* ---- Acciones ---- */
  .btn-accion {
    width: 100%;
    padding: 5px;
    border-radius: 4px;
    border: none;
    cursor: pointer;
    font-size: 10px;
    font-weight: 600;
    transition: opacity .15s;
    margin-top: 3px;
  }
  .btn-accion:hover { opacity: .85; }
  .btn-accion:disabled { opacity: .3; cursor: not-allowed; }
  .btn-primario { background: #e94560; color: #fff; }
  .btn-secundario { background: #0f3460; color: #e0e0e0; }

  /* ================================================================
     CANVAS CENTRAL
  ================================================================ */
  #area-canvas {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
    background: #12101e;
    background-image: radial-gradient(circle at 1px 1px, #1e1a3a 1px, transparent 0);
    background-size: 24px 24px;
  }

  #canvas-wrapper {
    position: relative;
    box-shadow: 0 8px 40px rgba(0,0,0,.6);
    cursor: crosshair;
    transform-origin: center center;
    background: #fff;
  }
  #canvas-wrapper canvas {
    position: absolute;
    top: 0; left: 0;
    image-rendering: pixelated;
  }
  #canvas-trazo { position: relative; z-index: 9999; pointer-events: none; }

  /* Zoom */
  #zoom-controls {
    position: absolute;
    bottom: 12px;
    right: 12px;
    display: flex;
    gap: 3px;
  }
  .zoom-btn {
    width: 26px; height: 26px;
    border-radius: 5px;
    border: 1px solid #0f3460;
    background: #16213e;
    color: #e0e0e0;
    cursor: pointer;
    font-size: 14px;
    display: flex; align-items: center; justify-content: center;
  }
  .zoom-btn:hover { background: #1f3460; }
  #zoom-label {
    height: 26px;
    padding: 0 6px;
    border-radius: 5px;
    border: 1px solid #0f3460;
    background: #16213e;
    color: #506070;
    font-size: 10px;
    display: flex; align-items: center;
  }

  /* Status */
  #statusbar {
    position: absolute;
    bottom: 12px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(22,33,62,.92);
    border: 1px solid #0f3460;
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 10px;
    color: #7a8ba0;
    pointer-events: none;
    opacity: 0;
    transition: opacity .3s;
    white-space: nowrap;
  }
  #statusbar.visible { opacity: 1; }

  /* Pantalla inicio */
  #pantalla-inicio {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    color: #506070;
    pointer-events: none;
  }
  #pantalla-inicio svg { opacity: .15; }
  #pantalla-inicio p { font-size: 14px; }

  /* ================================================================
     PANEL DERECHO — capas
  ================================================================ */
  #panel-der {
    width: 180px;
    min-width: 180px;
    background: #16213e;
    border-left: 1px solid #0f3460;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  #panel-der-header {
    padding: 6px 8px;
    border-bottom: 1px solid #0f3460;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  #panel-der-header span {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: .8px;
    color: #506070;
  }
  #btn-nueva-capa {
    background: none;
    border: 1px solid #0f3460;
    border-radius: 3px;
    color: #7a8ba0;
    font-size: 14px;
    width: 20px; height: 20px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    line-height: 1;
  }
  #btn-nueva-capa:hover { border-color: #e94560; color: #e0e0e0; }

  /* Propiedades capa activa */
  #capa-props {
    padding: 6px 8px;
    border-bottom: 1px solid #0f3460;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  #capa-props select {
    width: 100%;
    background: #1a2a4a;
    border: 1px solid #0f3460;
    color: #e0e0e0;
    border-radius: 3px;
    padding: 2px 4px;
    font-size: 10px;
  }

  /* Lista de capas con drag */
  #lista-capas {
    flex: 1;
    overflow-y: auto;
    padding: 4px;
    display: flex;
    flex-direction: column;
    gap: 3px;
  }

  .capa-item {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 5px 6px;
    border-radius: 5px;
    background: #1a2a4a;
    border: 1px solid transparent;
    cursor: pointer;
    transition: border-color .12s, background .12s;
    user-select: none;
  }
  .capa-item:hover { border-color: #2a4060; }
  .capa-item.activa { border-color: #e94560; background: #1f2a50; }
  .capa-item.drag-sobre { border-color: #e9c030; background: #2a2a1a; }

  .capa-drag-handle {
    color: #304050;
    font-size: 12px;
    cursor: grab;
    flex-shrink: 0;
    line-height: 1;
  }
  .capa-drag-handle:active { cursor: grabbing; }

  .capa-vis {
    cursor: pointer;
    font-size: 11px;
    user-select: none;
    flex-shrink: 0;
    opacity: .7;
  }
  .capa-vis:hover { opacity: 1; }

  .capa-thumb {
    width: 22px;
    height: 22px;
    border-radius: 3px;
    border: 1px solid #0f3460;
    background: repeating-conic-gradient(#2a3050 0% 25%, #1a2040 0% 50%) 0 0 / 6px 6px;
    flex-shrink: 0;
    overflow: hidden;
  }
  .capa-thumb canvas {
    width: 100%;
    height: 100%;
    image-rendering: pixelated;
  }

  .capa-info {
    flex: 1;
    overflow: hidden;
  }
  .capa-nombre {
    font-size: 11px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    color: #c0d0e0;
    cursor: text;
    line-height: 1.3;
  }
  .capa-tag {
    font-size: 8px;
    color: #506070;
    text-transform: uppercase;
    letter-spacing: .5px;
  }

  .capa-del {
    background: none;
    border: none;
    color: #304050;
    cursor: pointer;
    font-size: 12px;
    padding: 0;
    line-height: 1;
    flex-shrink: 0;
  }
  .capa-del:hover { color: #e94560; }

  /* Spinner */
  #spinner {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(10,8,20,.7);
    z-index: 100;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 10px;
  }
  #spinner.visible { display: flex; }
  .spin {
    width: 36px; height: 36px;
    border: 3px solid #0f3460;
    border-top-color: #e94560;
    border-radius: 50%;
    animation: giro .7s linear infinite;
  }
  @keyframes giro { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<!-- SPINNER -->
<div id="spinner">
  <div class="spin"></div>
  <span style="color:#7a8ba0;font-size:11px">Procesando...</span>
</div>

<!-- ================================================================
     PANEL IZQUIERDO
================================================================ -->
<div id="panel-izq">

  <!-- Carga -->
  <div class="sec">
    <div class="sec-title">Boceto</div>
    <div id="drop-zone">&#x1F4C2; Arrastra o haz click</div>
    <input type="file" id="input-archivo" accept="image/*">
  </div>

  <!-- Herramientas: 4 columnas, 2 filas -->
  <div class="sec">
    <div class="sec-title">Herramienta</div>
    <div class="tools-grid">
      <div class="tool-btn activo" id="tool-fill"       onclick="setHerramienta('fill')">
        <span class="ico">&#x1F5D8;</span>Fill
      </div>
      <div class="tool-btn" id="tool-pincel"            onclick="setHerramienta('pincel')">
        <span class="ico">&#x1F58C;</span>Plano
      </div>
      <div class="tool-btn" id="tool-pincel-acum"       onclick="setHerramienta('pincel-acum')">
        <span class="ico">&#x270F;</span>Acum.
      </div>
      <div class="tool-btn" id="tool-borrador"          onclick="setHerramienta('borrador')">
        <span class="ico">&#x25A1;</span>Goma
      </div>
      <div class="tool-btn" id="tool-varita"            onclick="setHerramienta('varita')"
           style="grid-column: span 2">
        <span class="ico">&#x2728;</span>Varita
      </div>
      <div class="tool-btn" id="tool-eyedropper"        onclick="setHerramienta('eyedropper')"
           style="grid-column: span 2">
        <span class="ico">&#x1F489;</span>Cuentag.
      </div>
    </div>

    <!-- Slider tamaño (pincel/goma) -->
    <div class="sl-row" id="row-tamano">
      <span class="sl-label">Tam.</span>
      <input type="range" id="sl-tamano" min="2" max="80" value="14"
        oninput="document.getElementById('val-tamano').textContent=this.value">
      <span class="sl-val" id="val-tamano">14</span>
    </div>
    <!-- Slider tolerancia fill / goma-color -->
    <div class="sl-row" id="row-tol">
      <span class="sl-label">Tol.</span>
      <input type="range" id="sl-tolerancia" min="1" max="50" value="15"
        oninput="document.getElementById('val-tolerancia').textContent=this.value">
      <span class="sl-val" id="val-tolerancia">15</span>
    </div>
    <!-- Slider opacidad pincel -->
    <div class="sl-row" id="row-opac-pincel">
      <span class="sl-label">Opac.</span>
      <input type="range" id="sl-opac-pincel" min="5" max="100" value="80"
        oninput="document.getElementById('val-opac-pincel').textContent=this.value">
      <span class="sl-val" id="val-opac-pincel">80</span>
    </div>
  </div>

  <!-- Color -->
  <div class="sec">
    <div class="sec-title">Color</div>
    <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px">
      <div id="color-preview"></div>
      <input type="color" id="color-custom" value="#f4c2a1" title="Personalizado"
        onchange="seleccionarColorHex(this.value)" style="flex:1;height:22px">
    </div>
    <div id="paleta-colores"></div>
  </div>

  <!-- Acciones -->
  <div class="sec" style="margin-top:auto">
    <button class="btn-accion btn-secundario" onclick="deshacer()">&#x21A9; Deshacer (Ctrl+Z)</button>
    <button class="btn-accion btn-primario" onclick="exportar()" id="btn-exportar" disabled>
      &#x2193; Exportar PNG
    </button>
  </div>

</div>

<!-- ================================================================
     CANVAS CENTRAL
================================================================ -->
<div id="area-canvas">
  <div id="pantalla-inicio">
    <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
      <rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/>
    </svg>
    <p>Carga un boceto para comenzar</p>
  </div>

  <div id="canvas-wrapper" style="display:none">
    <canvas id="canvas-trazo"></canvas>
  </div>

  <div id="zoom-controls">
    <button class="zoom-btn" onclick="ajustarZoom(-0.15)">&#x2212;</button>
    <div id="zoom-label">100%</div>
    <button class="zoom-btn" onclick="ajustarZoom(0.15)">&#x2B;</button>
    <button class="zoom-btn" onclick="resetZoom()" title="Ajustar pantalla">&#x26F6;</button>
  </div>

  <div id="statusbar"></div>
</div>

<!-- ================================================================
     PANEL DERECHO — capas
================================================================ -->
<div id="panel-der">
  <div id="panel-der-header">
    <span>Capas</span>
    <button id="btn-nueva-capa" onclick="agregarCapa()" title="Nueva capa">+</button>
  </div>

  <!-- Propiedades de la capa activa -->
  <div id="capa-props">
    <div class="sl-row">
      <span class="sl-label">Opac.</span>
      <input type="range" id="sl-opacidad" min="5" max="100" value="100"
        oninput="document.getElementById('val-opacidad').textContent=this.value; cambiarOpacidad(this.value)">
      <span class="sl-val" id="val-opacidad">100</span>
    </div>
    <select id="sel-blending" onchange="cambiarBlending(this.value)">
      <option value="normal">Normal</option>
      <option value="multiplicar">Multiplicar</option>
      <option value="screen">Aclarar (Screen)</option>
      <option value="overlay">Overlay</option>
    </select>
  </div>

  <!-- Lista de capas con drag & drop -->
  <div id="lista-capas"></div>
</div>

<script>
// ================================================================
// ESTADO GLOBAL
// ================================================================
const estado = {
  herramienta: 'fill',
  colorHex: '#f4c2a1',
  colorRgba: [244, 194, 161, 255],
  trazoB64: null,
  ancho: 0,
  alto: 0,
  zoom: 1,
  capas: [],
  capaActiva: null,
  pintando: false,
  _previewCanvas: null,
};

const CAPAS_PREDEFINIDAS = [
  { nombre: 'Base',   tag: 'base',    blending: 'normal',    opacidad: 100 },
  { nombre: 'Sombra', tag: 'sombra',  blending: 'multiplicar', opacidad: 70 },
  { nombre: 'Brillo', tag: 'brillo',  blending: 'screen',    opacidad: 60 },
];

const PALETA = [
  '#f4c2a1','#e8967a','#c8785a','#a05038','#6a3020',
  '#f9e4b7','#e8c882','#c8a050','#a07830',
  '#b5d5f5','#7aabe0','#4a82c0','#2a5890',
  '#c5e8c5','#82c882','#4a9850','#2a6830',
  '#f5b5c8','#e07a9a','#c04a72','#902050',
  '#e0c8f0','#b07ad0','#8050b0','#602090',
  '#e0e0e0','#a0a0a0','#505050','#202020',
  '#ffffff','#000000','#ff4444','#ffaa00',
];

// ================================================================
// PALETA
// ================================================================
function initPaleta() {
  const cont = document.getElementById('paleta-colores');
  cont.innerHTML = '';
  PALETA.forEach(hex => {
    const chip = document.createElement('div');
    chip.className = 'color-chip';
    chip.style.background = hex;
    chip.title = hex;
    chip.onclick = () => seleccionarColorHex(hex);
    cont.appendChild(chip);
  });
  seleccionarColorHex(estado.colorHex);
}

function seleccionarColorHex(hex) {
  estado.colorHex = hex;
  const opac = parseInt(document.getElementById('sl-opac-pincel').value);
  const a = Math.round(opac / 100 * 255);
  estado.colorRgba = [...hexARgb(hex), a];
  document.getElementById('color-custom').value = hex;
  document.getElementById('color-preview').style.background = hex;
  document.querySelectorAll('.color-chip').forEach(c => {
    const chex = rgbToHex(c.style.background);
    c.classList.toggle('sel', chex === hex.toLowerCase());
  });
}

function hexARgb(hex) {
  return [
    parseInt(hex.slice(1,3),16),
    parseInt(hex.slice(3,5),16),
    parseInt(hex.slice(5,7),16),
  ];
}

function hexARgba(hex, a) { return [...hexARgb(hex), a]; }

function rgbToHex(rgb) {
  const m = rgb.match(/\d+/g);
  if (!m) return '';
  return '#' + m.slice(0,3).map(x => parseInt(x).toString(16).padStart(2,'0')).join('');
}

// Actualizar alpha cuando cambia slider opac pincel
document.getElementById('sl-opac-pincel').addEventListener('input', () => {
  seleccionarColorHex(estado.colorHex);
});

// ================================================================
// CARGA DE IMAGEN
// ================================================================
const dropZone = document.getElementById('drop-zone');
const inputArchivo = document.getElementById('input-archivo');

dropZone.addEventListener('click', () => inputArchivo.click());
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  if (e.dataTransfer.files[0]) cargarArchivo(e.dataTransfer.files[0]);
});
inputArchivo.addEventListener('change', () => {
  if (inputArchivo.files[0]) cargarArchivo(inputArchivo.files[0]);
});

async function cargarArchivo(archivo) {
  mostrarSpinner(true);
  const fd = new FormData();
  fd.append('imagen', archivo);
  try {
    const resp = await fetch('/cargar', { method: 'POST', body: fd });
    const data = await resp.json();
    if (data.error) { alert(data.error); return; }
    inicializarCanvas(data.trazo_b64, data.ancho, data.alto);
  } catch(e) {
    alert('Error al cargar la imagen.');
  } finally {
    mostrarSpinner(false);
  }
}

function inicializarCanvas(trazoB64, ancho, alto) {
  estado.trazoB64 = trazoB64;
  estado.ancho = ancho;
  estado.alto = alto;
  estado.capas = [];
  estado.capaActiva = null;

  const wrapper = document.getElementById('canvas-wrapper');
  wrapper.querySelectorAll('.canvas-capa').forEach(c => c.remove());

  const trazoCanvas = document.getElementById('canvas-trazo');
  trazoCanvas.width = ancho;
  trazoCanvas.height = alto;
  wrapper.style.width = ancho + 'px';
  wrapper.style.height = alto + 'px';
  wrapper.style.display = 'block';
  document.getElementById('pantalla-inicio').style.display = 'none';

  const img = new Image();
  img.onload = () => {
    const ctx = trazoCanvas.getContext('2d');
    ctx.drawImage(img, 0, 0);
    const imageData = ctx.getImageData(0, 0, ancho, alto);
    const d = imageData.data;
    for (let i = 0; i < d.length; i += 4) {
      const t = d[i] / 255;
      const alpha = Math.min(255, Math.round((1 - t) * (1 - t) * 255 * 2.5));
      d[i] = 0; d[i+1] = 0; d[i+2] = 0; d[i+3] = alpha;
    }
    ctx.putImageData(imageData, 0, 0);
  };
  img.src = 'data:image/png;base64,' + trazoB64;

  ajustarZoomParaPantalla();

  // Crear capas predefinidas en orden Base → Sombra → Brillo
  CAPAS_PREDEFINIDAS.forEach(def => agregarCapa(def.nombre, def));
  // Activar la capa Base
  setCapaActiva(estado.capas[0].id);

  document.getElementById('btn-exportar').disabled = false;
  mostrarStatus('Boceto cargado. Capas Base, Sombra y Brillo listas.');
}

// ================================================================
// SISTEMA DE CAPAS
// ================================================================
let _capaId = 0;

function agregarCapa(nombre, def) {
  const id = ++_capaId;
  const n = nombre || `Capa ${id}`;
  const canvas = document.createElement('canvas');
  canvas.className = 'canvas-capa';
  canvas.width = estado.ancho || 1;
  canvas.height = estado.alto || 1;
  canvas.style.zIndex = id;

  const wrapper = document.getElementById('canvas-wrapper');
  const trazoCanvas = document.getElementById('canvas-trazo');
  wrapper.insertBefore(canvas, trazoCanvas);

  // Thumbnail canvas para el panel
  const thumb = document.createElement('canvas');
  thumb.width = 22; thumb.height = 22;

  const capa = {
    id,
    nombre: n,
    tag: def?.tag || '',
    canvas,
    thumb,
    visible: true,
    blending: def?.blending || 'normal',
    opacidad: def?.opacidad ?? 100,
    historial: [],
  };

  // Aplicar blending y opacidad iniciales
  aplicarBlendingCSS(capa);
  canvas.style.opacity = capa.opacidad / 100;

  estado.capas.push(capa);
  setCapaActiva(id);
  renderListaCapas();
  return capa;
}

function setCapaActiva(id) {
  estado.capaActiva = id;
  const capa = getCapaActiva();
  if (capa) {
    document.getElementById('sel-blending').value = capa.blending;
    document.getElementById('sl-opacidad').value = capa.opacidad;
    document.getElementById('val-opacidad').textContent = capa.opacidad;
  }
  renderListaCapas();
}

function getCapaActiva() {
  return estado.capas.find(c => c.id === estado.capaActiva);
}

function renderListaCapas() {
  const lista = document.getElementById('lista-capas');
  lista.innerHTML = '';

  // Las capas se muestran de arriba (ultima) hacia abajo (primera) — orden visual
  [...estado.capas].reverse().forEach((capa, i, arr) => {
    const item = document.createElement('div');
    item.className = 'capa-item' + (capa.id === estado.capaActiva ? ' activa' : '');
    item.dataset.id = capa.id;
    item.draggable = true;

    // Actualizar thumbnail
    actualizarThumb(capa);

    item.innerHTML = `
      <span class="capa-drag-handle" title="Arrastrar">&#x2630;</span>
      <span class="capa-vis" onclick="toggleVisible(${capa.id},event)">${capa.visible ? '&#x1F441;' : '&#xFE0F;&#x1F576;'}</span>
      <div class="capa-thumb" id="thumb-container-${capa.id}"></div>
      <div class="capa-info" onclick="setCapaActiva(${capa.id})">
        <div class="capa-nombre" ondblclick="renombrarCapa(${capa.id},this)">${escHtml(capa.nombre)}</div>
        ${capa.tag ? `<div class="capa-tag">${escHtml(capa.tag)}</div>` : ''}
      </div>
      <button class="capa-del" onclick="eliminarCapa(${capa.id},event)" title="Eliminar">&#x2715;</button>
    `;

    // Insertar thumb canvas real
    item.querySelector(`#thumb-container-${capa.id}`).appendChild(capa.thumb);

    // Drag & drop
    item.addEventListener('dragstart', onDragStart);
    item.addEventListener('dragover',  onDragOver);
    item.addEventListener('dragleave', onDragLeave);
    item.addEventListener('drop',      onDrop);
    item.addEventListener('dragend',   onDragEnd);

    lista.appendChild(item);
  });
}

function actualizarThumb(capa) {
  const ctx = capa.thumb.getContext('2d');
  ctx.clearRect(0, 0, 22, 22);
  ctx.drawImage(capa.canvas, 0, 0, 22, 22);
}

// ---- Drag & drop de capas ----
let _dragId = null;

function onDragStart(e) {
  _dragId = parseInt(this.dataset.id);
  e.dataTransfer.effectAllowed = 'move';
}
function onDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  this.classList.add('drag-sobre');
}
function onDragLeave() { this.classList.remove('drag-sobre'); }
function onDragEnd() {
  document.querySelectorAll('.capa-item').forEach(el => el.classList.remove('drag-sobre'));
}
function onDrop(e) {
  e.preventDefault();
  this.classList.remove('drag-sobre');
  const targetId = parseInt(this.dataset.id);
  if (_dragId === targetId) return;

  const fromIdx = estado.capas.findIndex(c => c.id === _dragId);
  const toIdx   = estado.capas.findIndex(c => c.id === targetId);
  if (fromIdx < 0 || toIdx < 0) return;

  // Reordenar array de capas
  const [moved] = estado.capas.splice(fromIdx, 1);
  estado.capas.splice(toIdx, 0, moved);

  // Actualizar z-index de los canvas segun nueva posicion
  estado.capas.forEach((c, i) => { c.canvas.style.zIndex = i + 1; });

  renderListaCapas();
}

function toggleVisible(id, e) {
  e.stopPropagation();
  const capa = estado.capas.find(c => c.id === id);
  if (!capa) return;
  capa.visible = !capa.visible;
  capa.canvas.style.opacity = capa.visible ? (capa.opacidad / 100) : 0;
  renderListaCapas();
}

function eliminarCapa(id, e) {
  e.stopPropagation();
  if (estado.capas.length <= 1) { mostrarStatus('Debe haber al menos una capa.'); return; }
  const idx = estado.capas.findIndex(c => c.id === id);
  estado.capas[idx].canvas.remove();
  estado.capas.splice(idx, 1);
  if (estado.capaActiva === id) setCapaActiva(estado.capas[0].id);
  renderListaCapas();
}

function renombrarCapa(id, el) {
  const capa = estado.capas.find(c => c.id === id);
  if (!capa) return;
  const input = document.createElement('input');
  input.value = capa.nombre;
  input.style.cssText = 'width:100%;background:#0f1e3a;border:1px solid #e94560;color:#e0e0e0;border-radius:3px;padding:0 3px;font-size:11px';
  el.replaceWith(input);
  input.focus(); input.select();
  const ok = () => { capa.nombre = input.value.trim() || capa.nombre; renderListaCapas(); };
  input.addEventListener('blur', ok);
  input.addEventListener('keydown', e => { if (e.key === 'Enter') ok(); });
}

function cambiarBlending(val) {
  const capa = getCapaActiva();
  if (capa) { capa.blending = val; aplicarBlendingCSS(capa); }
}

function cambiarOpacidad(val) {
  const capa = getCapaActiva();
  if (capa) {
    capa.opacidad = parseInt(val);
    capa.canvas.style.opacity = capa.visible ? (capa.opacidad / 100) : 0;
  }
}

function aplicarBlendingCSS(capa) {
  const modos = { normal: 'normal', multiplicar: 'multiply', screen: 'screen', overlay: 'overlay' };
  capa.canvas.style.mixBlendMode = modos[capa.blending] || 'normal';
}

// ================================================================
// HERRAMIENTAS
// ================================================================
function setHerramienta(h) {
  estado.herramienta = h;
  document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('activo'));
  const btn = document.getElementById('tool-' + h);
  if (btn) btn.classList.add('activo');

  const esPincel  = h === 'pincel' || h === 'pincel-acum';
  const esBorrador = h === 'borrador';
  const esFill    = h === 'fill';
  const esVarita  = h === 'varita';

  document.getElementById('row-tamano').style.opacity   = (esPincel || esBorrador) ? 1 : 0.3;
  document.getElementById('row-tol').style.opacity      = (esFill || esVarita) ? 1 : 0.3;
  document.getElementById('row-opac-pincel').style.opacity = esPincel ? 1 : 0.3;

  const msgs = {
    fill: 'Click para rellenar zona hasta el trazo',
    pincel: 'Pincel plano: la opacidad no acumula entre pasadas',
    'pincel-acum': 'Pincel acumulacion: cada pasada suma opacidad',
    borrador: 'Goma: borra todo lo que toca',
    varita: 'Varita: click para seleccionar y borrar color similar',
    eyedropper: 'Cuentagotas: click para tomar color de la capa activa',
  };
  if (msgs[h]) mostrarStatus(msgs[h]);
  actualizarCursor();
}

// ================================================================
// CURSORES PERSONALIZADOS
// ================================================================
// El cursor del pincel/goma muestra un circulo del tamaño real del brush.
// Los demas usan SVG inline codificado como data URI.

function svgCursor(svgContent, w, h, hotX, hotY) {
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}" viewBox="0 0 ${w} ${h}">${svgContent}</svg>`;
  const uri = `url("data:image/svg+xml,${encodeURIComponent(svg)}") ${hotX} ${hotY}, crosshair`;
  return uri;
}

const CURSORES = {
  fill: () => svgCursor(`
    <circle cx="13" cy="13" r="11" fill="#1a2a4a" stroke="#e94560" stroke-width="1.5" opacity=".92"/>
    <path d="M8 14 Q13 6 18 14 Q13 20 8 14Z" fill="#e94560"/>
    <line x1="13" y1="3" x2="13" y2="1" stroke="#e94560" stroke-width="1.5"/>
  `, 26, 26, 13, 13),

  varita: () => svgCursor(`
    <line x1="4" y1="22" x2="16" y2="10" stroke="#e0e0e0" stroke-width="2" stroke-linecap="round"/>
    <rect x="14" y="2" width="5" height="10" rx="2" transform="rotate(45 16 7)"
      fill="#e94560" stroke="#fff" stroke-width="1"/>
    <circle cx="4" cy="4" r="2" fill="#fff" opacity=".9"/>
    <circle cx="10" cy="2" r="1.5" fill="#fff" opacity=".6"/>
    <circle cx="2" cy="10" r="1.5" fill="#fff" opacity=".6"/>
  `, 26, 26, 4, 22),

  eyedropper: () => svgCursor(`
    <circle cx="8" cy="18" r="5" fill="none" stroke="#e0e0e0" stroke-width="1.5"/>
    <line x1="11" y1="15" x2="20" y2="6" stroke="#e0e0e0" stroke-width="2" stroke-linecap="round"/>
    <circle cx="20" cy="6" r="3" fill="#e94560" stroke="#fff" stroke-width="1"/>
    <line x1="8" y1="13" x2="8" y2="23" stroke="#e94560" stroke-width="1" opacity=".5"/>
    <line x1="3" y1="18" x2="13" y2="18" stroke="#e94560" stroke-width="1" opacity=".5"/>
  `, 26, 26, 8, 18),
};

function cursorCirculo(tamano, color, relleno) {
  const r   = Math.max(2, Math.round(tamano / 2 * estado.zoom));
  const dim = r * 2 + 4;
  const cx  = r + 2;
  const fill = relleno ? color : 'none';
  const svg  = `<svg xmlns="http://www.w3.org/2000/svg" width="${dim}" height="${dim}">
    <circle cx="${cx}" cy="${cx}" r="${r}" fill="${fill}" fill-opacity=".15"
      stroke="${color}" stroke-width="1.5" stroke-dasharray="${relleno ? 'none' : '3,2'}"/>
    <line x1="${cx}" y1="${cx-4}" x2="${cx}" y2="${cx+4}" stroke="${color}" stroke-width="1" opacity=".7"/>
    <line x1="${cx-4}" y1="${cx}" x2="${cx+4}" y2="${cx}" stroke="${color}" stroke-width="1" opacity=".7"/>
  </svg>`;
  return `url("data:image/svg+xml,${encodeURIComponent(svg)}") ${cx} ${cx}, crosshair`;
}

function actualizarCursor() {
  const h      = estado.herramienta;
  const tamano = parseInt(document.getElementById('sl-tamano')?.value || 14);
  let cursor;

  if      (h === 'fill')        cursor = CURSORES.fill();
  else if (h === 'varita')      cursor = CURSORES.varita();
  else if (h === 'eyedropper')  cursor = CURSORES.eyedropper();
  else if (h === 'pincel')      cursor = cursorCirculo(tamano, '#e94560', false);
  else if (h === 'pincel-acum') cursor = cursorCirculo(tamano, '#ffaa00', true);
  else if (h === 'borrador')    cursor = cursorCirculo(tamano, '#a0b0c0', false);
  else                          cursor = 'crosshair';

  document.getElementById('canvas-wrapper').style.cursor = cursor;
}

// Actualizar cursor cuando cambia el tamaño del pincel
document.getElementById('sl-tamano').addEventListener('input', actualizarCursor);

// ================================================================
// INTERACCION CON CANVAS
// ================================================================
const wrapper = document.getElementById('canvas-wrapper');

wrapper.addEventListener('mousedown', e => {
  if (!estado.trazoB64) return;
  const [cx, cy] = coordenadas(e);
  const h = estado.herramienta;

  if (h === 'fill')        { hacerFill(cx, cy); return; }
  if (h === 'varita')      { hacerVarita(cx, cy); return; }
  if (h === 'eyedropper')  { tomarColor(cx, cy); return; }

  estado.pintando = true;
  iniciarPincelada(cx, cy);
});

wrapper.addEventListener('mousemove', e => {
  if (!estado.pintando) return;
  continuarPincelada(...coordenadas(e));
});
wrapper.addEventListener('mouseup',    () => { if (estado.pintando) { estado.pintando = false; commitPincelada(); } });
wrapper.addEventListener('mouseleave', () => { if (estado.pintando) { estado.pintando = false; commitPincelada(); } });

function coordenadas(e) {
  const rect = wrapper.getBoundingClientRect();
  return [
    Math.round((e.clientX - rect.left) / estado.zoom),
    Math.round((e.clientY - rect.top)  / estado.zoom),
  ];
}

// ================================================================
// FILL (relleno por trazo, en servidor)
// ================================================================
async function hacerFill(x, y) {
  const capa = getCapaActiva();
  if (!capa) return;
  mostrarSpinner(true);
  const tol = parseInt(document.getElementById('sl-tolerancia').value);
  try {
    const resp = await fetch('/fill', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ trazo_b64: estado.trazoB64, x, y, color: estado.colorRgba, tolerancia: tol }),
    });
    const data = await resp.json();
    if (data.error) { mostrarStatus(data.error); return; }
    guardarHistorial(capa);
    dibujarB64EnCapa(capa, data.capa_b64);
  } catch { mostrarStatus('Error en fill.'); }
  finally  { mostrarSpinner(false); }
}

function dibujarB64EnCapa(capa, b64) {
  const img = new Image();
  img.onload = () => {
    capa.canvas.getContext('2d').drawImage(img, 0, 0);
    aplicarBlendingCSS(capa);
    capa.canvas.style.opacity = capa.visible ? (capa.opacidad / 100) : 0;
    actualizarThumb(capa);
  };
  img.src = 'data:image/png;base64,' + b64;
}

// ================================================================
// VARITA MAGICA
//
// Dos BFS en secuencia, luego interseccion:
//
// 1. BFS de REGION (sobre el trazo): expande desde (x,y) bloqueándose
//    en píxeles donde el trazo es opaco. Produce la máscara de la región
//    contigua al click en el mismo lado del trazo.
//
// 2. BFS de COLOR (sobre la capa): expande desde (x,y) bloqueándose
//    en píxeles cuyo color difiere demasiado del semilla.
//
// Solo se borran los píxeles que están en AMBAS máscaras.
// Resultado: borra el color salido, pero solo dentro de la región clickeada.
// ================================================================
async function hacerVarita(x, y) {
  const capa = getCapaActiva();
  if (!capa) return;

  mostrarSpinner(true);
  const tol = parseInt(document.getElementById('sl-tolerancia').value);

  try {
    // El servidor hace flood fill sobre el trazo original (imagen procesada por OpenCV)
    // y devuelve la mascara de la region clickeada — sin problemas de anti-alias ni CSS
    const resp = await fetch('/varita', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ trazo_b64: estado.trazoB64, x, y, tolerancia: tol }),
    });
    const data = await resp.json();
    if (data.error) { mostrarStatus('Varita: ' + data.error); return; }

    // Aplicar la mascara como borrado sobre la capa activa
    guardarHistorial(capa);
    const img = new Image();
    img.onload = () => {
      const ctx = capa.canvas.getContext('2d');
      ctx.globalCompositeOperation = 'destination-out';
      ctx.drawImage(img, 0, 0);
      ctx.globalCompositeOperation = 'source-over';
      aplicarBlendingCSS(capa);
      actualizarThumb(capa);
      mostrarStatus('Varita: region borrada.');
    };
    img.src = 'data:image/png;base64,' + data.mascara_b64;

  } catch(e) {
    mostrarStatus('Error en varita.');
  } finally {
    mostrarSpinner(false);
  }
}

// ================================================================
// CUENTAGOTAS
// ================================================================
function tomarColor(x, y) {
  const capa = getCapaActiva();
  if (!capa) return;
  const p = capa.canvas.getContext('2d').getImageData(x, y, 1, 1).data;
  if (p[3] === 0) { mostrarStatus('Pixel transparente, sin color.'); return; }
  const hex = '#' + [p[0],p[1],p[2]].map(v => v.toString(16).padStart(2,'0')).join('');
  seleccionarColorHex(hex);
  mostrarStatus('Color tomado: ' + hex);
}

// ================================================================
// PINCEL — dos modos:
//   pincel      : plano, nunca acumula (ni entre pinceladas)
//   pincel-acum : acumula opacidad cada pasada
//   borrador    : borra directo con destination-out
// ================================================================
let _pincelTemp  = null;  // canvas temporal de la pincelada en curso
let _capaBase    = null;  // snapshot ImageData del estado de la capa ANTES de pintar (modo plano)
let _ultimaPos   = null;

function iniciarPincelada(x, y) {
  const capa = getCapaActiva();
  if (!capa) return;
  guardarHistorial(capa);

  const h = estado.herramienta;

  if (h === 'pincel-acum' || h === 'borrador') {
    // Directo sobre la capa, sin temp ni base snapshot
    _pincelTemp = null;
    _capaBase   = null;
  } else {
    // Modo plano: guardamos el estado actual de la capa como base fija.
    // Cada segmento se pinta sobre el temp y luego se compone sobre esa base.
    // Asi, pasar N veces produce exactamente el mismo resultado que pasar 1 vez.
    const ctx = capa.canvas.getContext('2d');
    _capaBase  = ctx.getImageData(0, 0, estado.ancho, estado.alto);

    _pincelTemp = document.createElement('canvas');
    _pincelTemp.width  = estado.ancho;
    _pincelTemp.height = estado.alto;
  }

  _ultimaPos = [x, y];
  _dibujarSegmento(x, y, x, y);
  if (_pincelTemp) _composicionPlano();
}

function continuarPincelada(x, y) {
  _dibujarSegmento(_ultimaPos[0], _ultimaPos[1], x, y);
  _ultimaPos = [x, y];
  if (_pincelTemp) _composicionPlano();
}

function commitPincelada() {
  if (_capaBase) {
    // El canvas ya tiene el resultado correcto aplicado en _composicionPlano;
    // no hay nada mas que hacer salvo limpiar.
    _capaBase   = null;
    _pincelTemp = null;
    const capa = getCapaActiva();
    if (capa) actualizarThumb(capa);
  } else {
    // pincel-acum / borrador: ya esta pintado en la capa
    const capa = getCapaActiva();
    if (capa) actualizarThumb(capa);
  }
}

function _dibujarSegmento(x0, y0, x1, y1) {
  const h      = estado.herramienta;
  const tamano = parseInt(document.getElementById('sl-tamano').value);
  const [r,g,b] = estado.colorRgba;
  const opac   = parseInt(document.getElementById('sl-opac-pincel').value) / 100;

  // Destino del trazo
  const dest = _pincelTemp || getCapaActiva()?.canvas;
  if (!dest) return;
  const ctx = dest.getContext('2d');

  ctx.lineWidth = tamano;
  ctx.lineCap   = 'round';
  ctx.lineJoin  = 'round';

  if (h === 'borrador') {
    ctx.globalCompositeOperation = 'destination-out';
    ctx.strokeStyle = 'rgba(0,0,0,1)';
    ctx.globalAlpha = opac;
  } else if (h === 'pincel-acum') {
    ctx.globalCompositeOperation = 'source-over';
    ctx.strokeStyle = `rgba(${r},${g},${b},${opac})`;
    ctx.globalAlpha = 1;
  } else {
    // pincel plano: pinta opaco en el temp; la opacidad se aplica en _composicionPlano
    ctx.globalCompositeOperation = 'source-over';
    ctx.strokeStyle = `rgb(${r},${g},${b})`;
    ctx.globalAlpha = 1;
  }

  ctx.beginPath();
  ctx.moveTo(x0, y0);
  ctx.lineTo(x1, y1);
  ctx.stroke();
  ctx.globalCompositeOperation = 'source-over';
  ctx.globalAlpha = 1;
}

// Compone base + temp sobre el canvas de la capa, respetando la opacidad del pincel.
// El truco: restaura el estado base, luego aplica el temp con globalAlpha = opac.
// Asi, pintar encima N veces produce el mismo resultado — la base nunca cambia mid-pincelada.
function _composicionPlano() {
  const capa = getCapaActiva();
  if (!capa || !_capaBase || !_pincelTemp) return;
  const ctx  = capa.canvas.getContext('2d');
  const opac = parseInt(document.getElementById('sl-opac-pincel').value) / 100;

  // 1. Restaurar base
  ctx.putImageData(_capaBase, 0, 0);
  // 2. Superponer el trazo acumulado del temp con la opacidad elegida
  ctx.globalAlpha = opac;
  ctx.globalCompositeOperation = 'source-over';
  ctx.drawImage(_pincelTemp, 0, 0);
  ctx.globalAlpha = 1;
  ctx.globalCompositeOperation = 'source-over';

  aplicarBlendingCSS(capa);
}

// ================================================================
// HISTORIAL
// ================================================================
function guardarHistorial(capa) {
  capa.historial.push(capa.canvas.toDataURL());
  if (capa.historial.length > 20) capa.historial.shift();
}

function deshacer() {
  const capa = getCapaActiva();
  if (!capa || capa.historial.length === 0) {
    mostrarStatus('Nada que deshacer en esta capa.');
    return;
  }
  const snap = capa.historial.pop();
  const img = new Image();
  img.onload = () => {
    const ctx = capa.canvas.getContext('2d');
    ctx.clearRect(0, 0, capa.canvas.width, capa.canvas.height);
    ctx.drawImage(img, 0, 0);
    actualizarThumb(capa);
  };
  img.src = snap;
}

// ================================================================
// EXPORTAR
// ================================================================
async function exportar() {
  mostrarSpinner(true);
  const capasData = estado.capas.map(c => ({
    b64: c.canvas.toDataURL('image/png').split(',')[1],
    blending: c.blending,
    opacidad: c.opacidad,
    visible: c.visible,
  }));
  try {
    const resp = await fetch('/exportar', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ trazo_b64: estado.trazoB64, capas: capasData, ancho: estado.ancho, alto: estado.alto }),
    });
    const data = await resp.json();
    if (data.error) { alert(data.error); return; }
    const a = document.createElement('a');
    a.href = 'data:image/png;base64,' + data.imagen_b64;
    a.download = 'ilustracion.png';
    a.click();
    mostrarStatus('PNG exportado.');
  } catch(e) {
    alert('Error al exportar.');
  } finally {
    mostrarSpinner(false);
  }
}

// ================================================================
// ZOOM
// ================================================================
function ajustarZoom(d) {
  estado.zoom = Math.max(0.15, Math.min(5, estado.zoom + d));
  aplicarZoom();
}
function resetZoom() { ajustarZoomParaPantalla(); }
function ajustarZoomParaPantalla() {
  const area = document.getElementById('area-canvas');
  const zx = (area.clientWidth  - 40) / estado.ancho;
  const zy = (area.clientHeight - 40) / estado.alto;
  estado.zoom = Math.min(zx, zy, 1);
  aplicarZoom();
}
function aplicarZoom() {
  document.getElementById('canvas-wrapper').style.transform = `scale(${estado.zoom})`;
  document.getElementById('zoom-label').textContent = Math.round(estado.zoom * 100) + '%';
  actualizarCursor();
}
document.getElementById('area-canvas').addEventListener('wheel', e => {
  e.preventDefault();
  ajustarZoom(e.deltaY < 0 ? 0.1 : -0.1);
}, { passive: false });

// ================================================================
// UTILIDADES UI
// ================================================================
let _stTimer;
function mostrarStatus(msg) {
  const bar = document.getElementById('statusbar');
  bar.textContent = msg;
  bar.classList.add('visible');
  clearTimeout(_stTimer);
  _stTimer = setTimeout(() => bar.classList.remove('visible'), 3000);
}
function mostrarSpinner(v) {
  document.getElementById('spinner').classList.toggle('visible', v);
}
function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'z') { e.preventDefault(); deshacer(); }
});

// ================================================================
// INIT
// ================================================================
initPaleta();
setHerramienta('fill');
actualizarCursor();
</script>
</body>
